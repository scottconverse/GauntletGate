<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1120" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <style>
    .bg{fill:#ffffff}
    .cmd{fill:#eef6ff;stroke:#0969da;stroke-width:2;rx:10}
    .lane{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1.5;rx:10}
    .acc{fill:#fff7ed;stroke:#f59e0b;stroke-width:2;rx:10}
    .back{fill:#f3f0ff;stroke:#8957e5;stroke-width:1.5;rx:10}
    .ok{fill:#eaf7ee;stroke:#1a7f37;stroke-width:2;rx:10}
    .warn{fill:#fff8e6;stroke:#9a6700;stroke-width:2;rx:10}
    .bad{fill:#fef3f2;stroke:#d92d20;stroke-width:2;rx:10}
    .t{fill:#1f2328;font-size:15px}
    .tb{fill:#1f2328;font-size:15px;font-weight:700}
    .sm{fill:#57606a;font-size:12.5px}
    .accT{fill:#9a3412;font-size:12px;font-weight:600}
    .title{fill:#1f2328;font-size:22px;font-weight:800}
    .sub{fill:#57606a;font-size:13.5px}
    .arr{stroke:#6e7781;stroke-width:2;fill:none;marker-end:url(#a)}
    .arrA{stroke:#f59e0b;stroke-width:2;fill:none;marker-end:url(#aA);stroke-dasharray:5 4}
    .lab{fill:#57606a;font-size:11.5px}
    .pill{fill:#1f2328;font-size:12px;font-weight:700}
  </style>
  <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#6e7781"/></marker>
  <marker id="aA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#f59e0b"/></marker>

  <rect class="bg" x="0" y="0" width="900" height="1120"/>
  <text class="title" x="40" y="46">GauntletGate — the stage-gate</text>
  <text class="sub" x="40" y="70">One command. The argument picks the lanes. Only the full run can clear a product to advance.</text>

  <!-- command -->
  <rect class="cmd" x="300" y="92" width="300" height="56" rx="10"/>
  <text class="tb" x="450" y="118" text-anchor="middle">/gauntletgate &lt;args&gt;</text>
  <text class="sm" x="450" y="137" text-anchor="middle">all · lite · walkthrough · full · any combo  (bare = all)</text>

  <!-- dispatch arrows to lanes -->
  <path class="arr" d="M380 148 L210 196"/>
  <path class="arr" d="M450 148 L450 196"/>
  <path class="arr" d="M520 148 L690 196"/>

  <!-- LITE -->
  <rect class="lane" x="60" y="198" width="280" height="96" rx="10"/>
  <text class="pill" x="78" y="224">LITE</text>
  <text class="sm" x="78" y="246">fast single-pass on a change/slice</text>
  <text class="sm" x="78" y="264">first-run-aware · light · inline</text>
  <text class="accT" x="78" y="284">feeder in `all`; never the gate alone</text>

  <!-- WALKTHROUGH -->
  <rect class="acc" x="356" y="198" width="280" height="96" rx="10"/>
  <text class="pill" x="374" y="224">WALKTHROUGH</text>
  <text class="sm" x="374" y="246">first-run-truth + wiring runtime audit</text>
  <text class="accT" x="374" y="266">constructs + VERIFIES first-run state;</text>
  <text class="accT" x="374" y="284">walks with dependencies ABSENT</text>

  <!-- FULL -->
  <rect class="lane" x="652" y="198" width="280" height="96" rx="10"/>
  <text class="pill" x="670" y="224">FULL</text>
  <text class="sm" x="670" y="246">5-role adversarial deep audit</text>
  <text class="sm" x="670" y="264">eng · security · perf · tests · docs · QA</text>
  <text class="accT" x="670" y="284">heavy · multi-agent · billed</text>

  <!-- walkthrough -> full consume arrow -->
  <path class="arrA" d="M636 246 L652 246"/>
  <text class="lab" x="600" y="320" text-anchor="middle">Full CONSUMES the Walkthrough report</text>
  <text class="lab" x="600" y="336" text-anchor="middle">(it doesn't re-walk the UI)</text>

  <!-- shared backbone -->
  <rect class="back" x="60" y="360" width="872" height="74" rx="10"/>
  <text class="tb" x="80" y="386">Shared backbone — one source of truth for all three lanes</text>
  <text class="sm" x="80" y="408">① the first-run rule (verify the clean/dependency-absent state; provisioned dev box is disqualifying)</text>
  <text class="sm" x="80" y="426">② the environment-provisioning attestation (gates the first-run verdict)   ③ one severity framework</text>
  <path class="arr" d="M200 360 L200 300"/>
  <path class="arr" d="M496 360 L496 300"/>
  <path class="arr" d="M792 360 L792 300"/>

  <!-- synthesize -->
  <path class="arr" d="M200 294 L200 330"/>
  <path class="arr" d="M496 460 L496 486"/>
  <rect class="cmd" x="296" y="488" width="308" height="58" rx="10"/>
  <text class="tb" x="450" y="514" text-anchor="middle">Synthesize → one gate report</text>
  <text class="sm" x="450" y="533" text-anchor="middle">verdict · attestation · findings · punch list · watchlist</text>
  <path class="arr" d="M450 546 L450 580"/>

  <!-- verdict diamond -->
  <polygon class="warn" points="450,584 640,636 450,688 260,636"/>
  <text class="tb" x="450" y="630" text-anchor="middle">Did `all` run, at 0 Blocker / 0 Critical,</text>
  <text class="tb" x="450" y="650" text-anchor="middle">first-run VALID + reachable?</text>

  <!-- outcomes -->
  <path class="arr" d="M450 688 L450 724"/>
  <rect class="ok" x="300" y="726" width="300" height="60" rx="10"/>
  <text class="tb" x="450" y="752" text-anchor="middle" fill="#1a7f37">✅ CLEAR TO ADVANCE</text>
  <text class="sm" x="450" y="772" text-anchor="middle">only the full run earns this</text>

  <path class="arr" d="M260 636 L150 636 L150 800"/>
  <rect class="warn" x="60" y="802" width="300" height="60" rx="10"/>
  <text class="tb" x="210" y="828" text-anchor="middle" fill="#9a6700">⚠️ PARTIAL CHECK</text>
  <text class="sm" x="210" y="848" text-anchor="middle">any run missing a required lane — not a gate</text>

  <path class="arr" d="M640 636 L750 636 L750 800"/>
  <rect class="bad" x="600" y="802" width="300" height="60" rx="10"/>
  <text class="tb" x="750" y="828" text-anchor="middle" fill="#d92d20">⛔ DO NOT ADVANCE</text>
  <text class="sm" x="750" y="848" text-anchor="middle">any Blocker/Critical or INVALID first-run</text>

  <text class="sub" x="40" y="912">Amber = the first-run discipline ordinary checks skip.  Adversarial by default: the gate's job is to block advancement, not wave it through.</text>
  <text class="sub" x="40" y="934">Audit-only: GauntletGate does not modify product source unless explicitly switched to repair mode.</text>
</svg>
